<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronos 7 | Public Social Network</title>
    
    <link rel="icon" type="image/jpeg" href="IMG-20260302-WA0005.jpg">

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        :root { --primary: #00a2ff; --bg: #050505; --panel: #111; --text: #fff; --border: #222; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }
        .hidden { display: none !important; }
        
        /* ESTILO DA LOGO */
        .logo-container { 
            text-align: center; 
            margin-bottom: 25px; 
            padding: 10px;
        }
        .logo-img { 
            width: 140px; 
            height: auto; 
            object-fit: contain;
            /* Efeito para suavizar a borda da imagem no fundo preto */
            mix-blend-mode: lighten; 
        }

        .auth-container { height: 100vh; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle at center, #111 0%, #000 100%); }
        .auth-box { background: var(--panel); padding: 35px; border-radius: 15px; border: 1px solid var(--border); width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 6px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--primary); }
        
        .main-app { display: grid; grid-template-columns: 280px 1fr; height: 100vh; }
        .sidebar { background: var(--panel); border-right: 1px solid var(--border); padding: 25px; display: flex; flex-direction: column; }
        .content { padding: 40px; overflow-y: auto; background: #080808; }

        .nav-link { padding: 14px; margin: 5px 0; border-radius: 8px; cursor: pointer; transition: 0.3s; font-weight: 500; color: #aaa; }
        .nav-link:hover { background: #1a1a1a; color: #fff; }
        .nav-link.active { background: var(--primary); color: white; }
        .btn-main { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-main:hover { opacity: 0.9; transform: translateY(-1px); }

        .card { background: var(--panel); border: 1px solid var(--border); padding: 25px; border-radius: 12px; margin-bottom: 25px; position: relative; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .post-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .post-title { color: var(--primary); font-size: 1.3rem; font-weight: bold; }
        .delete-btn { color: #ff4444; background: none; border: none; cursor: pointer; font-size: 11px; position: absolute; top: 20px; right: 20px; text-transform: uppercase; letter-spacing: 1px; }

        .actions { display: flex; gap: 20px; margin-top: 15px; border-top: 1px solid #222; padding-top: 15px; }
        .action-btn { cursor: pointer; font-size: 14px; color: #888; background: none; border: none; display: flex; align-items: center; gap: 5px; }
        .action-btn:hover { color: var(--primary); }

        .comment-section { margin-top: 15px; padding-left: 10px; border-left: 2px solid #222; }
        .comment { background: #161616; padding: 10px; border-radius: 6px; margin-bottom: 8px; font-size: 13px; border: 1px solid #222; }
        .comment b { color: var(--primary); margin-right: 5px; }
    </style>
</head>
<body>

    <div id="auth-screen" class="auth-container">
        <div class="auth-box">
            <img src="IMG-20260302-WA0005.jpg" alt="Logo" style="width: 110px; mix-blend-mode: lighten; margin-bottom: 10px;">
            <h1 style="margin-bottom: 5px;">CRONOS <span style="color:var(--primary)">7</span></h1>
            <p style="color:#555; font-size: 13px; margin-bottom: 25px;">NETWORK ACCESS PANEL</p>
            <input type="text" id="reg-name" placeholder="Choose Unique Username">
            <input type="email" id="email" placeholder="Your Email Address">
            <input type="password" id="pass" placeholder="Your Password (min. 6 chars)">
            <button class="btn-main" onclick="handleAuth()">LOGIN / JOIN NETWORK</button>
            <p id="auth-error" style="color:#ff4444; font-size:12px; margin-top:15px;"></p>
        </div>
    </div>

    <div id="app-screen" class="main-app hidden">
        <div class="sidebar">
            <div class="logo-container">
                <img src="IMG-20260302-WA0005.jpg" alt="Cronos 7" class="logo-img">
            </div>
            
            <div id="user-display" style="font-size:12px; text-align:center; color:#555; margin-bottom: 30px; letter-spacing: 1px;"></div>
            
            <div class="nav-link active" id="link-feed" onclick="showTab('feed')">GLOBAL FEED</div>
            <div class="nav-link" id="link-create" onclick="showTab('create')">CREATE POST</div>
            
            <div style="margin-top: auto;">
                <button style="background: #333;" class="btn-main" onclick="logout()">LOGOUT</button>
            </div>
        </div>

        <div class="content">
            <div id="tab-feed">
                <h1 style="margin-top:0">Recent Activity</h1>
                <div id="posts-container">Establishing secure connection...</div>
            </div>

            <div id="tab-create" class="hidden">
                <h1 style="margin-top:0">New Transmission</h1>
                <input type="text" id="post-title" placeholder="Transmission Title">
                <textarea id="post-content" rows="8" placeholder="Enter your data here..."></textarea>
                <button class="btn-main" style="width: 200px;" onclick="publishPost()">BROADCAST</button>
            </div>
        </div>
    </div>

    <script>
        // ... (Firebase Config e Scripts permanecem os mesmos que enviamos antes)
        const firebaseConfig = {
            apiKey: "AIzaSyBFtmgcnxahTDzM-LE16i2dpE5ydqXHhv0",
            authDomain: "youy-f5937.firebaseapp.com",
            projectId: "youy-f5937",
            storageBucket: "youy-f5937.appspot.com",
            messagingSenderId: "952770584090",
            appId: "1:952770584090:web:2514f4f320f8be64c73ba3"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        let userProfile = null;

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            const name = document.getElementById('reg-name').value.trim();
            const errDiv = document.getElementById('auth-error');
            errDiv.innerText = "";
            if (!email || !pass) return alert("Please fill all fields.");
            try {
                await auth.signInWithEmailAndPassword(email, pass).catch(async (err) => {
                    if (err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential') {
                        if(!name) throw new Error("Account not found. Please enter a Username.");
                        const snap = await db.collection("users").where("username", "==", name).get();
                        if(!snap.empty) throw new Error("Username already taken.");
                        const newUser = await auth.createUserWithEmailAndPassword(email, pass);
                        await db.collection("users").doc(newUser.user.uid).set({ username: name, joined: new Date().toISOString() });
                        return newUser;
                    }
                    throw err;
                });
            } catch (e) { errDiv.innerText = "STATUS: " + e.message; }
        }

        async function publishPost() {
            const title = document.getElementById('post-title').value;
            const body = document.getElementById('post-content').value;
            if(!title || !body) return alert("All fields are mandatory.");
            const postId = Date.now().toString();
            try {
                await db.collection("posts").doc(postId).set({
                    title, body,
                    author: userProfile.username,
                    authorId: auth.currentUser.uid,
                    likes: 0,
                    comments: [],
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                document.getElementById('post-title').value = "";
                document.getElementById('post-content').value = "";
                showTab('feed');
            } catch(e) { alert(e.message); }
        }

        function loadFeed() {
            db.collection("posts").orderBy("timestamp", "desc").onSnapshot(snap => {
                const container = document.getElementById('posts-container');
                container.innerHTML = "";
                snap.forEach(doc => {
                    const post = doc.data();
                    const id = doc.id;
                    const isOwner = auth.currentUser && post.authorId === auth.currentUser.uid;
                    container.innerHTML += `<div class="card">
                        ${isOwner ? `<button class="delete-btn" onclick="deletePost('${id}')">Terminate</button>` : ''}
                        <div class="post-header"><span class="post-title">${post.title}</span><small style="color:#555">@${post.author}</small></div>
                        <p style="color:#ccc">${post.body}</p>
                        <div class="actions">
                            <button class="action-btn" onclick="likePost('${id}', ${post.likes})">👍 ${post.likes}</button>
                            <button class="action-btn" onclick="addComment('${id}')">💬 COMMENT</button>
                        </div>
                        <div class="comment-section">${post.comments ? post.comments.map(c => `<div class="comment"><b>${c.user}</b> ${c.text}</div>`).join('') : ''}</div>
                    </div>`;
                });
            });
        }

        async function likePost(id, current) { await db.collection("posts").doc(id).update({ likes: current + 1 }); }
        async function addComment(id) {
            const msg = prompt("Message:");
            if(!msg) return;
            await db.collection("posts").doc(id).update({ comments: firebase.firestore.FieldValue.arrayUnion({ user: userProfile.username, text: msg }) });
        }
        async function deletePost(id) { if(confirm("Confirm?")) await db.collection("posts").doc(id).delete(); }

        auth.onAuthStateChanged(async user => {
            if(user) {
                const doc = await db.collection("users").doc(user.uid).get();
                if(doc.exists) {
                    userProfile = doc.data();
                    document.getElementById('auth-screen').classList.add('hidden');
                    document.getElementById('app-screen').classList.remove('hidden');
                    document.getElementById('user-display').innerText = "ID: " + userProfile.username.toUpperCase();
                    loadFeed();
                }
            }
        });

        function showTab(t) {
            document.getElementById('tab-feed').classList.toggle('hidden', t !== 'feed');
            document.getElementById('tab-create').classList.toggle('hidden', t !== 'create');
            document.getElementById('link-feed').classList.toggle('active', t === 'feed');
            document.getElementById('link-create').classList.toggle('active', t === 'create');
        }
        function logout() { auth.signOut().then(() => location.reload()); }
    </script>
</body>
</html>
