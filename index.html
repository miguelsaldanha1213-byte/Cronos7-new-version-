<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronos 7 | Professional Social Network</title>
    <link rel="icon" type="image/jpeg" href="IMG-20260302-WA0005.jpg">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <style>
        :root { 
            --primary: #00a2ff; --bg: #050505; --panel: #111; --text: #fff; --border: #222; 
            --dev: #ff4757; --art: #ffa502; --science: #2ed573; --phil: #a29bfe; --danger: #ff4444;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }
        .hidden { display: none !important; }
        
        .sidebar { background: var(--panel); border-right: 1px solid var(--border); padding: 25px; display: flex; flex-direction: column; width: 260px; position: fixed; height: 100vh; z-index: 100; }
        .logo-img { width: 80px; mix-blend-mode: lighten; margin-bottom: 20px; align-self: center; }
        .nav-link { padding: 12px; margin: 5px 0; border-radius: 8px; cursor: pointer; color: #aaa; transition: 0.2s; font-weight: 500; }
        .nav-link:hover { background: #1a1a1a; color: #fff; }
        .nav-link.active { background: var(--primary); color: #fff; }

        .content { margin-left: 260px; padding: 40px; background: #080808; min-height: 100vh; }
        .search-container { width: 100%; max-width: 600px; margin-bottom: 30px; }
        .search-container input { width: 100%; padding: 15px; background: #111; border: 1px solid #333; color: white; border-radius: 30px; outline: none; }

        .card { background: var(--panel); border: 1px solid var(--border); padding: 20px; border-radius: 12px; margin-bottom: 20px; position: relative; }
        .author-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .user-avatar { width: 45px; height: 45px; border-radius: 50%; background: #222; object-fit: cover; }
        .author-name { font-weight: bold; font-size: 1rem; color: var(--text); }
        .author-role { color: #666; font-size: 0.8rem; display: block; }
        
        .actions-bar { display: flex; gap: 20px; margin-top: 15px; border-top: 1px solid #222; padding-top: 10px; }
        .action-item { cursor: pointer; font-size: 0.85rem; color: #888; display: flex; align-items: center; gap: 5px; }
        .action-item:hover { color: var(--primary); }
        .liked { color: var(--primary); font-weight: bold; }

        .comment-section { margin-top: 10px; background: #0c0c0c; border-radius: 8px; padding: 10px; font-size: 0.9rem; }
        .comment { border-bottom: 1px solid #1a1a1a; padding: 5px 0; }
        .comment b { color: var(--primary); }

        .profile-header { text-align: center; padding: 30px; border-bottom: 1px solid var(--border); }
        .profile-pic-lg { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--primary); object-fit: cover; }

        .btn-main { padding: 10px 20px; background: var(--primary); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; box-sizing: border-box; }
        
        .follow-btn { padding: 5px 15px; border-radius: 20px; border: 1px solid var(--primary); background: transparent; color: var(--primary); cursor: pointer; font-size: 0.8rem; font-weight: bold; }
        .follow-btn.active { background: var(--primary); color: white; }
    </style>
</head>
<body>

    <div id="auth-screen" style="height: 100vh; display: flex; justify-content: center; align-items: center;">
        <div style="background: var(--panel); padding: 40px; border-radius: 15px; width: 320px; text-align: center; border: 1px solid var(--border);">
            <img src="IMG-20260302-WA0005.jpg" class="logo-img">
            <h2 id="auth-title">LOGIN</h2>
            <div id="reg-fields" class="hidden">
                <input type="text" id="reg-user" placeholder="Username (@)">
            </div>
            <input type="email" id="auth-email" placeholder="Email">
            <input type="password" id="auth-pass" placeholder="Password">
            <button class="btn-main" style="width:100%" onclick="handleAuth()">CONTINUE</button>
            <p onclick="toggleAuth()" style="color: var(--primary); cursor: pointer; font-size: 0.8rem; margin-top: 15px;">Switch Login/Register</p>
        </div>
    </div>

    <div id="app-screen" class="hidden">
        <div class="sidebar">
            <img src="IMG-20260302-WA0005.jpg" class="logo-img">
            <div class="nav-link active" id="link-feed" onclick="showTab('feed')">FEED</div>
            <div class="nav-link" id="link-create" onclick="showTab('create')">BROADCAST</div>
            <div class="nav-link" id="link-profile" onclick="showTab('profile')">STATION</div>
            <button class="btn-main" onclick="logout()" style="margin-top:auto; background:#222">LOGOUT</button>
        </div>

        <div class="content">
            <div id="tab-feed">
                <div class="search-container">
                    <input type="text" id="search-input" placeholder="Search professionals or topics..." onkeyup="filterFeed()">
                </div>
                <div id="posts-container">Establishing uplink...</div>
            </div>

            <div id="tab-create" class="hidden">
                <h2>New Professional Transmission</h2>
                <input type="text" id="post-title" placeholder="Project / Theory Title">
                <select id="post-category">
                    <option value="science">Physics / Mathematics</option>
                    <option value="dev">Software Engineering</option>
                    <option value="art">Arts / Acting</option>
                    <option value="phil">Philosophy</option>
                </select>
                <textarea id="post-content" rows="6" placeholder="What are you working on?"></textarea>
                <button class="btn-main" onclick="publishPost()">BROADCAST</button>
            </div>

            <div id="tab-profile" class="hidden">
                <div class="profile-header">
                    <img id="p-img" src="" class="profile-pic-lg">
                    <h2 id="p-user"></h2>
                    <p id="p-role" style="color: var(--primary);"></p>
                </div>
                <h3>Station Settings</h3>
                <input type="text" id="edit-pic" placeholder="Profile Picture URL">
                <input type="text" id="edit-role" placeholder="Role (e.g., Theoretical Physicist)">
                <textarea id="edit-bio" placeholder="Professional Bio..."></textarea>
                <button class="btn-main" onclick="updateProfile()">SAVE SETTINGS</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBFtmgcnxahTDzM-LE16i2dpE5ydqXHhv0",
            authDomain: "youy-f5937.firebaseapp.com",
            projectId: "youy-f5937",
            storageBucket: "youy-f5937.appspot.com",
            messagingSenderId: "952770584090",
            appId: "1:952770584090:web:2514f4f320f8be64c73ba3"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        let userProfile = null;
        let isReg = false;
        let allPosts = [];
        let myFollows = [];

        function toggleAuth() {
            isReg = !isReg;
            document.getElementById('reg-fields').classList.toggle('hidden', !isReg);
            document.getElementById('auth-title').innerText = isReg ? "REGISTER" : "LOGIN";
        }

        async function handleAuth() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            if (isReg) {
                const user = document.getElementById('reg-user').value.toLowerCase();
                const snap = await db.collection("users").where("username", "==", user).get();
                if(!snap.empty) return alert("Username already taken!");
                const res = await auth.createUserWithEmailAndPassword(email, pass);
                await db.collection("users").doc(res.user.uid).set({
                    username: user, role: "Specialist", pic: "https://via.placeholder.com/100", bio: ""
                });
            } else {
                await auth.signInWithEmailAndPassword(email, pass).catch(e => alert("Login Error"));
            }
        }

        async function publishPost() {
            const title = document.getElementById('post-title').value;
            const content = document.getElementById('post-content').value;
            const cat = document.getElementById('post-category').value;
            if(!title || !content) return;
            await db.collection("posts").add({
                title, body: content, category: cat, author: userProfile.username,
                authorId: auth.currentUser.uid, authorPic: userProfile.pic,
                authorRole: userProfile.role, likes: [], timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            showTab('feed');
        }

        async function toggleLike(postId, likesArray) {
            const uid = auth.currentUser.uid;
            const newLikes = likesArray.includes(uid) ? likesArray.filter(id => id !== uid) : [...likesArray, uid];
            await db.collection("posts").doc(postId).update({ likes: newLikes });
        }

        async function addComment(postId) {
            const text = prompt("Type your comment:");
            if(!text) return;
            await db.collection("posts").doc(postId).collection("comments").add({
                user: userProfile.username, text, timestamp: new Date()
            });
        }

        async function toggleFollow(targetId) {
            const myId = auth.currentUser.uid;
            const ref = db.collection("follows").doc(`${myId}_${targetId}`);
            const doc = await ref.get();
            if(doc.exists) await ref.delete();
            else await ref.set({ follower: myId, following: targetId });
        }

        async function updateProfile() {
            const pic = document.getElementById('edit-pic').value;
            const role = document.getElementById('edit-role').value;
            const bio = document.getElementById('edit-bio').value;
            await db.collection("users").doc(auth.currentUser.uid).update({ 
                pic: pic || userProfile.pic, role: role || userProfile.role, bio: bio || userProfile.bio 
            });
            location.reload();
        }

        function filterFeed() {
            const q = document.getElementById('search-input').value.toLowerCase();
            const filtered = allPosts.filter(d => {
                const p = d.data();
                return p.author.toLowerCase().includes(q) || p.title.toLowerCase().includes(q) || p.authorRole.toLowerCase().includes(q);
            });
            renderPosts(filtered);
        }

        async function renderPosts(docs) {
            const container = document.getElementById('posts-container');
            container.innerHTML = "";
            for (const doc of docs) {
                const p = doc.data();
                const isLiked = p.likes.includes(auth.currentUser.uid);
                const isFollowing = myFollows.includes(p.authorId);
                const isMe = p.authorId === auth.currentUser.uid;

                let commentHtml = "";
                const cSnap = await db.collection("posts").doc(doc.id).collection("comments").orderBy("timestamp", "asc").limit(3).get();
                cSnap.forEach(c => { commentHtml += `<div class="comment"><b>@${c.data().user}</b>: ${c.data().text}</div>`; });

                container.innerHTML += `
                    <div class="card">
                        <div class="author-row">
                            <img src="${p.authorPic}" class="user-avatar">
                            <div style="flex:1">
                                <span class="author-name">@${p.author}</span>
                                <span class="author-role">${p.authorRole}</span>
                            </div>
                            ${!isMe ? `<button class="follow-btn ${isFollowing?'active':''}" onclick="toggleFollow('${p.authorId}')">${isFollowing?'Following':'Follow'}</button>` : ''}
                        </div>
                        <div style="color:var(--primary); font-weight:bold; margin-bottom:5px;">${p.title}</div>
                        <p style="white-space:pre-wrap; margin:0; color:#ddd;">${p.body}</p>
                        <div class="actions-bar">
                            <div class="action-item ${isLiked?'liked':''}" onclick="toggleLike('${doc.id}', ${JSON.stringify(p.likes)})">▲ ${p.likes.length} Upvotes</div>
                            <div class="action-item" onclick="addComment('${doc.id}')">💬 Comment</div>
                        </div>
                        <div class="comment-section">${commentHtml || 'No comments yet...'}</div>
                    </div>`;
            }
        }

        auth.onAuthStateChanged(async user => {
            if(user) {
                const dUser = await db.collection("users").doc(user.uid).get();
                userProfile = dUser.data();
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                document.getElementById('p-user').innerText = "@" + userProfile.username;
                document.getElementById('p-role').innerText = userProfile.role;
                document.getElementById('p-img').src = userProfile.pic;

                db.collection("follows").where("follower", "==", user.uid).onSnapshot(s => {
                    myFollows = s.docs.map(d => d.data().following);
                });

                db.collection("posts").orderBy("timestamp", "desc").onSnapshot(snap => {
                    allPosts = snap.docs;
                    filterFeed();
                });
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('app-screen').classList.add('hidden');
            }
        });

        function showTab(t) {
            ['feed', 'create', 'profile'].forEach(id => {
                document.getElementById('tab-'+id).classList.toggle('hidden', id !== t);
                document.getElementById('link-'+id).classList.toggle('active', id === t);
            });
        }
        function logout() { auth.signOut(); }
    </script>
</body>
</html>
